<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ukana Odpurev — Photography</title>
  <link rel="icon" type="image/png" href="assets/favicon.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- FIXED LEFT OVERLAY: paper + name + nav -->
  <div class="site-overlay">
    <p class="site-name">UKANA ODPUREV</p>
    <nav class="side-nav" id="sideNav">
      <span class="nav-item active">HOME</span>
      <a class="nav-item" href="portfolio.html">PORTFOLIO</a>
      <a class="nav-item" href="about.html">ABOUT</a>
      <a class="nav-item" href="bookme.html">BOOK ME</a>
    </nav>
  </div>

  <!-- TOP RIGHT ICON -->
  <div class="top-right-icon">+</div>

  <!-- BACKGROUND VIDEO -->
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://res.cloudinary.com/doailynuq/video/upload/background.mp4" type="video/mp4" />
  </video>

  <script src="config.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Prefetch all other pages so navigation is instant
    ['portfolio.html', 'about.html', 'bookme.html'].forEach(page => {
      const link = document.createElement('link');
      link.rel  = 'prefetch';
      link.href = page;
      document.head.appendChild(link);
    });

    // Preload all Cloudinary images in the background while user is on home page
    // Uses a small delay so it doesn't compete with the video loading
    setTimeout(() => {
      const cats  = CONFIG.cloudinary.categories;
      const order = ['graduation', 'portrait', 'wedding', 'cars', 'events', 'street'];
      order.forEach(cat => {
        const count = cats[cat]?.count || 0;
        for (let i = 1; i <= count; i++) {
          const img = new Image();
          img.src = cloudinaryUrl(cat, i);
        }
      });
    }, 1500); // wait 1.5s so video gets priority first
  </script>
</body>
</html>
