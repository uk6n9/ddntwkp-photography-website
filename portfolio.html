  <script>
    function showView(view) {
      document.getElementById('viewEverything').style.display = view === 'everything' ? 'block' : 'none';
      document.getElementById('viewCategories').style.display = view === 'categories' ? 'block' : 'none';
      document.getElementById('btnEverything').classList.toggle('active', view === 'everything');
      document.getElementById('btnCategories').classList.toggle('active', view === 'categories');
    }

    // Dynamically offset main content based on actual nav overlay right edge
    function syncMainMargin() {
      const overlay  = document.querySelector('.site-overlay');
      const main     = document.querySelector('.portfolio-main');
      const siteName = document.querySelector('.site-name');
      if (!overlay || !main || !siteName) return;
      // Use the widest nav text element as the reference, not the full paper element
      const navItems = document.querySelectorAll('.nav-item');
      let maxRight = siteName.getBoundingClientRect().right;
      navItems.forEach(el => {
        const r = el.getBoundingClientRect().right;
        if (r > maxRight) maxRight = r;
      });
      main.style.marginLeft = (maxRight + 20) + 'px';
    }

    // Run on load and resize
    window.addEventListener('resize', syncMainMargin);

    // Watch for transform changes on overlay (set by main.js setupOverlayScale)
    const overlayEl = document.querySelector('.site-overlay');
    new MutationObserver(syncMainMargin).observe(overlayEl, {
      attributes: true, attributeFilter: ['style']
    });

    // Also run after a short delay to catch late transform application
    setTimeout(syncMainMargin, 50);
    setTimeout(syncMainMargin, 200);
  </script>
